services:
  - type: web
    name: kite-conditions
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn kite_web:app --bind 0.0.0.0:$PORT --workers 3
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATA_DIR
        value: /opt/render/project/src/data
    plan: free
